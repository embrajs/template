name: build
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies 📦
        run: npm ci
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_loglevel: "error"

      - name: Lint 🧹
        run: |
          npm run lint:ci
          npm run ts-check

      - name: Build 🔧
        run: npm run build

      - name: Build Docs 📖
        run: npm run docs

      - name: Test 🧪
        run: npm run test:ci

      - name: Create Coverage Badge 🏷️
        run: npx coverage-badge-svg

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
